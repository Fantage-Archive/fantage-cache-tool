name: Build Releases

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            arch: x64
            python-version: "3.8.10"
            artifact: FantageArchiveCacheTool-Windows-x64

          # macOS x64 (Intel-native binary, built on Apple Silicon via Rosetta)
          - os: macos-latest
            arch: x64
            python-version: "3.11"
            artifact: FantageArchiveCacheTool-macOS-x64

          # Linux x64
          - os: ubuntu-latest
            arch: x64
            python-version: "3.11"
            artifact: FantageArchiveCacheTool-Linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.arch }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade "pip<26"
          python -m pip install -r requirements.txt

      - name: Build executable (Unix)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --name "FantageArchiveCacheTool" \
            --add-data "assets/thatsonecrazymonkey.gif:." \
            --add-data "assets/FA_logo.png:." \
            --hidden-import "PIL._tkinter_finder" \
            src/main.py

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name "FantageArchiveCacheTool" `
            --add-data "assets\thatsonecrazymonkey.gif;." `
            --add-data "assets\FA_logo.png;." `
            --hidden-import "PIL._tkinter_finder" `
            --icon "assets\FA_logo.png" `
            src\main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/FantageArchiveCacheTool*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release

          # ---- Windows x64 ----
          cp artifacts/FantageArchiveCacheTool-Windows-x64/FantageArchiveCacheTool.exe \
             release/FantageArchiveCacheTool-Windows.exe

          # ---- macOS x64 (Intel, Apple Silicon via Rosetta 2) ----
          chmod +x artifacts/FantageArchiveCacheTool-macOS-x64/FantageArchiveCacheTool
          cd artifacts/FantageArchiveCacheTool-macOS-x64
          zip ../../release/FantageArchiveCacheTool-macOS.zip FantageArchiveCacheTool
          cd ../..

          # ---- Linux x64 ----
          chmod +x artifacts/FantageArchiveCacheTool-Linux-x64/FantageArchiveCacheTool
          cd artifacts/FantageArchiveCacheTool-Linux-x64
          tar czf ../../release/FantageArchiveCacheTool-Linux.tar.gz FantageArchiveCacheTool
          cd ../..

      - name: Generate release notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          CLEAN_VERSION=${VERSION#v}
          echo "CLEAN_VERSION=${CLEAN_VERSION}" >> $GITHUB_ENV
          REPO_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}"

          cat > release_notes.md << BODY
          ## Downloads

          | Name | File | OS |
          |------|------|----|
          | Windows Executable (Windows 7 SP1+) | [FantageArchiveCacheTool-Windows.exe](${REPO_URL}/FantageArchiveCacheTool-Windows.exe) | ![Windows](https://img.shields.io/badge/-Windows-0078D4?logo=windows&logoColor=white) |
          | macOS (Intel, runs on Apple Silicon via Rosetta) | [FantageArchiveCacheTool-macOS.zip](${REPO_URL}/FantageArchiveCacheTool-macOS.zip) | ![macOS](https://img.shields.io/badge/-macOS-000000?logo=apple&logoColor=white) |
          | Linux | [FantageArchiveCacheTool-Linux.tar.gz](${REPO_URL}/FantageArchiveCacheTool-Linux.tar.gz) | ![Linux](https://img.shields.io/badge/-Linux-FCC624?logo=linux&logoColor=black) |

          ## Windows 7

          The Windows executable is built with Python 3.8 so it can run on Windows 7 SP1 systems. Windows 7 users may still need Microsoft update KB2533623 installed.

          ## How to Use

          1. Download the correct version for the computer that has the cache
          2. Put it on a USB flash drive from another computer
          3. Plug the flash drive into the computer with the cache
          4. Turn off the internet on that computer because browsers can clear old caches when they connect
          5. Close all browsers (they can lock or overwrite cache files while running)
          6. Do NOT clear your browser history or caches
          7. Run the tool directly from the flash drive
          8. Enter your Discord or Fantage username when prompted
          9. Click Start Extraction and wait for it to finish
          10. Send the generated .zip file to the Fantage Archive / Rewritten team

          ## What's New in ${CLEAN_VERSION}

          1. The tool now rebuilds Fantage browser cache files into normal folders when the browser cache metadata has the original URL.
          2. This helps recover files from Fantage domains into their original URL folders instead of only copying raw cache folders.
          3. The tool now handles Windows and Internet Explorer cache data, old Chromium cache data, Firefox cache data, and Chrome simple cache data.
          4. The older raw file scan still runs after the new decoder, so partial and unusual caches can still be collected.
          BODY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Version ${{ env.CLEAN_VERSION }}"
          files: release/*
          body_path: release_notes.md
