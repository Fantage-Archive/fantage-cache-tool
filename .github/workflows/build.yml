name: Build Releases

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # Windows (x86_64 — also runs on ARM64 Windows via emulation)
          - os: windows-latest
            artifact: FantageArchiveCacheTool-Windows-x64

          # macOS Apple Silicon (ARM64) — used for universal binary
          - os: macos-latest
            artifact: FantageArchiveCacheTool-macOS-arm64

          # macOS Intel (x86_64) — used for universal binary
          - os: macos-13
            artifact: FantageArchiveCacheTool-macOS-x64

          # Linux (x86_64)
          - os: ubuntu-latest
            artifact: FantageArchiveCacheTool-Linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          pip install pyinstaller Pillow

      - name: Build executable (Unix)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --name "FantageArchiveCacheTool" \
            --add-data "assets/thatsonecrazymonkey.gif:." \
            --add-data "assets/FA_logo.png:." \
            --hidden-import "PIL._tkinter_finder" \
            src/main.py

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name "FantageArchiveCacheTool" `
            --add-data "assets\thatsonecrazymonkey.gif;." `
            --add-data "assets\FA_logo.png;." `
            --hidden-import "PIL._tkinter_finder" `
            --icon "assets\FA_logo.png" `
            src\main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/FantageArchiveCacheTool*

  release:
    needs: build
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release

          # ---- Windows x64 ----
          cp artifacts/FantageArchiveCacheTool-Windows-x64/FantageArchiveCacheTool.exe \
             release/FantageArchiveCacheTool-Windows.exe

          # ---- macOS Universal (merge ARM64 + x86_64 with lipo) ----
          chmod +x artifacts/FantageArchiveCacheTool-macOS-arm64/FantageArchiveCacheTool
          chmod +x artifacts/FantageArchiveCacheTool-macOS-x64/FantageArchiveCacheTool
          lipo -create \
            artifacts/FantageArchiveCacheTool-macOS-arm64/FantageArchiveCacheTool \
            artifacts/FantageArchiveCacheTool-macOS-x64/FantageArchiveCacheTool \
            -output release/FantageArchiveCacheTool
          chmod +x release/FantageArchiveCacheTool
          cd release && zip FantageArchiveCacheTool-macOS-Universal.zip FantageArchiveCacheTool && rm FantageArchiveCacheTool && cd ..

          # ---- Linux x64 ----
          chmod +x artifacts/FantageArchiveCacheTool-Linux-x64/FantageArchiveCacheTool
          cd artifacts/FantageArchiveCacheTool-Linux-x64
          tar czf ../../release/FantageArchiveCacheTool-Linux.tar.gz FantageArchiveCacheTool
          cd ../..

      - name: Generate release notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          REPO_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}"

          cat > release_notes.md << 'BODY'
          ## Downloads

          | Name | File | OS |
          |------|------|----|
          | Windows Executable | [FantageArchiveCacheTool-Windows.exe](REPO_URL_PLACEHOLDER/FantageArchiveCacheTool-Windows.exe) | ![Windows](https://img.shields.io/badge/-Windows-0078D4?logo=windows&logoColor=white) |
          | macOS Universal (Intel + Apple Silicon) | [FantageArchiveCacheTool-macOS-Universal.zip](REPO_URL_PLACEHOLDER/FantageArchiveCacheTool-macOS-Universal.zip) | ![macOS](https://img.shields.io/badge/-macOS-000000?logo=apple&logoColor=white) |
          | Linux | [FantageArchiveCacheTool-Linux.tar.gz](REPO_URL_PLACEHOLDER/FantageArchiveCacheTool-Linux.tar.gz) | ![Linux](https://img.shields.io/badge/-Linux-FCC624?logo=linux&logoColor=black) |

          ## What's New

          ### Features
          - Scans 30+ browsers including Chrome, Firefox, Edge, Brave, Opera, Vivaldi, Waterfox, Pale Moon, SeaMonkey, Maxthon, and more
          - Targets Macromedia Flash Player SharedObjects, Adobe Flash standalone, PepperFlash (per-browser), and Shockwave Player
          - Extracted files maintain their original path hierarchy so you can see exactly where they came from
          - Works on Windows, macOS, and Linux as a single standalone executable
          - Stop anytime and still get a zip of everything found so far
          - Username tagging for output folder and zip file naming
          - Built-in instructions popup on first launch
          BODY

          sed -i '' "s|REPO_URL_PLACEHOLDER|${REPO_URL}|g" release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Version ${GITHUB_REF#refs/tags/v}"
          files: release/*
          body_path: release_notes.md
